version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: workflow-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: workflow-rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: workflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  workflow-service:
    build:
      context: .
      dockerfile: src/Services/WorkflowService/WorkflowService.API/Dockerfile
    container_name: workflow-service
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=WorkflowServiceDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - Jwt__SigningKey=CHANGE_ME_super_secret_signing_key_min_32_chars
    depends_on:
      sqlserver:
        condition: service_healthy

  trigger-service:
    build:
      context: .
      dockerfile: src/Services/TriggerService/TriggerService.API/Dockerfile
    container_name: trigger-service
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=TriggerServiceDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - RabbitMq__Host=rabbitmq
      - Jwt__SigningKey=CHANGE_ME_super_secret_signing_key_min_32_chars
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  execution-service:
    build:
      context: .
      dockerfile: src/Services/ExecutionService/ExecutionService.API/Dockerfile
    container_name: execution-service
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=ExecutionServiceDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      - ConnectionStrings__Redis=redis:6379
      - RabbitMq__Host=rabbitmq
      - Services__WorkflowService=http://workflow-service:8080
      - Jwt__SigningKey=CHANGE_ME_super_secret_signing_key_min_32_chars
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      workflow-service:
        condition: service_started

  ai-task-service:
    build:
      context: .
      dockerfile: src/Services/AITaskService/AITaskService.API/Dockerfile
    container_name: ai-task-service
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__Host=rabbitmq
      - AiProvider__ApiKey=
      - Jwt__SigningKey=CHANGE_ME_super_secret_signing_key_min_32_chars
    depends_on:
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: src/Services/NotificationService/NotificationService.API/Dockerfile
    container_name: notification-service
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMq__Host=rabbitmq
      - Jwt__SigningKey=CHANGE_ME_super_secret_signing_key_min_32_chars
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  sqlserver-data:
